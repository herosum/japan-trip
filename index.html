<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本行記帳報告版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #F8FAFC; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .chart-bar { transition: width 0.5s ease-in-out; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col">
        
        <div class="p-6 pt-10 flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="font-black text-2xl tracking-tighter text-gray-800">JAPAN <span class="text-red-500">2026</span></h1>
            <button onclick="exportToCSV()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">
                <i class="fas fa-file-export mr-1"></i> 導出 CSV
            </button>
        </div>

        <div id="statsSection" class="px-6 mb-6">
            <div class="bg-gray-900 rounded-3xl p-5 text-white shadow-xl">
                <p class="text-[10px] opacity-50 font-bold tracking-widest mb-4 uppercase">Spending Analysis</p>
                <div id="categoryBars" class="space-y-3"></div>
            </div>
        </div>

        <div class="px-6 space-y-3">
            <div class="flex items-center bg-gray-50 rounded-2xl p-4 border border-gray-100">
                <span class="text-xl font-bold text-gray-400 mr-2">¥</span>
                <input type="number" id="amountInput" placeholder="金額" class="bg-transparent text-2xl font-black w-full outline-none">
                <div class="text-right border-l pl-3 ml-2">
                    <p class="text-[9px] text-gray-400 font-bold">1k JPY=</p>
                    <input type="number" id="rateInput" value="51.5" step="0.1" class="w-8 text-xs font-bold text-blue-500 bg-transparent outline-none">
                </div>
            </div>
            
            <input type="text" id="descInput" placeholder="項目描述 (如: 敘敘苑燒肉)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-4 px-5 text-sm outline-none">
            
            <div class="flex gap-2">
                <select id="categoryInput" class="flex-1 bg-gray-50 border border-gray-100 rounded-2xl py-4 px-3 text-sm outline-none appearance-none">
                    <option value="utensils">🍴 美食</option>
                    <option value="train">🚃 交通</option>
                    <option value="shopping-bag">🛍️ 購物</option>
                    <option value="hotel">🏨 住宿</option>
                    <option value="ticket">🎫 景點</option>
                </select>
                <select id="methodInput" class="flex-1 bg-gray-50 border border-gray-100 rounded-2xl py-4 px-3 text-sm outline-none appearance-none">
                    <option value="💵 現金">💵 現金日圓</option>
                    <option value="💳 信用卡">💳 信用卡</option>
                    <option value="🅿️ Paypay">🅿️ Paypay</option>
                    <option value="🅰️ Alipay">🅰️ Alipay</option>
                    <option value="🐧 Suica">🐧 Suica/IC</option>
                </select>
            </div>

            <button onclick="addRecord()" class="w-full bg-gray-900 text-white font-bold rounded-2xl py-5 active:scale-95 transition-all shadow-lg">
                儲存紀錄
            </button>
        </div>

        <div class="px-6 mt-10 pb-28 flex-grow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-black text-gray-400 text-xs tracking-widest uppercase">Transactions</h2>
                <button onclick="clearAll()" class="text-red-400 text-[10px] font-bold border border-red-100 px-2 py-1 rounded-md">RESET</button>
            </div>
            <div id="recordList" class="space-y-3"></div>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t p-6 flex justify-between items-center shadow-2xl">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total JPY</p>
                <p id="totalJPY" class="font-black text-xl text-gray-800">¥ 0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total HKD</p>
                <p id="totalHKD" class="font-black text-xl text-blue-600">HK$ 0</p>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('jp_trip_data')) || [];
        const catMap = { utensils: "美食", train: "交通", "shopping-bag": "購物", hotel: "住宿", ticket: "景點" };

        function updateStats() {
            const container = document.getElementById('categoryBars');
            const total = records.reduce((sum, r) => sum + Number(r.amount), 0);
            container.innerHTML = '';
            const catTotals = {};
            records.forEach(r => catTotals[r.icon] = (catTotals[r.icon] || 0) + Number(r.amount));
            Object.keys(catMap).forEach(key => {
                const amount = catTotals[key] || 0;
                const percent = total > 0 ? (amount / total * 100).toFixed(0) : 0;
                container.innerHTML += `<div><div class="flex justify-between text-[10px] mb-1"><span>${catMap[key]}</span><span>${percent}%</span></div><div class="w-full bg-gray-800 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full chart-bar" style="width: ${percent}%"></div></div></div>`;
            });
        }

        function render() {
            const list = document.getElementById('recordList');
            const rate = parseFloat(document.getElementById('rateInput').value) / 1000;
            list.innerHTML = '';
            let totalJpy = 0;
            records.slice().reverse().forEach((item, index) => {
                const realIndex = records.length - 1 - index;
                totalJpy += Number(item.amount);
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white border border-gray-100 p-4 rounded-2xl shadow-sm text-sm">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-${item.icon} text-gray-300"></i>
                            <div>
                                <p class="font-bold text-gray-700">${item.desc || '項目'}</p>
                                <p class="text-[9px] text-gray-400 uppercase">${item.time} · <span class="text-blue-400">${item.method}</span></p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-800">¥${Number(item.amount).toLocaleString()}</p>
                            <p class="text-[9px] text-gray-300">HK$${(item.amount * rate).toFixed(0)}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('totalJPY').innerText = `¥ ${totalJpy.toLocaleString()}`;
            document.getElementById('totalHKD').innerText = `HK$ ${(totalJpy * rate).toFixed(0)}`;
            updateStats();
        }

        function addRecord() {
            const amount = document.getElementById('amountInput').value;
            const desc = document.getElementById('descInput').value;
            const icon = document.getElementById('categoryInput').value;
            const method = document.getElementById('methodInput').value; // 抓取支付方式
            if (!amount) return;
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            records.push({ amount, desc, icon, time: timeStr, method: method });
            localStorage.setItem('jp_trip_data', JSON.stringify(records));
            document.getElementById('amountInput').value = '';
            document.getElementById('descInput').value = '';
            render();
        }

        function clearAll() { if(confirm('確定清空？')) { records = []; localStorage.removeItem('jp_trip_data'); render(); } }
        function exportToCSV() { /* 同前版本導出功能 */ }
        document.getElementById('rateInput').addEventListener('input', render);
        render();
    </script>
</body>
</html>
