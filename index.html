<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本行記帳報告版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197604.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #F8FAFC; font-family: -apple-system, sans-serif; }
        .chart-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col">
        
        <div class="p-6 pt-10 flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="font-black text-2xl tracking-tighter text-gray-800">JAPAN <span class="text-red-500">2026</span></h1>
            <button onclick="exportToCSV()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-100">
                <i class="fas fa-file-export mr-1"></i> 導出 CSV 報告
            </button>
        </div>

        <div id="statsSection" class="px-6 mb-6">
            <div class="bg-gray-900 rounded-3xl p-5 text-white shadow-xl">
                <p class="text-[10px] opacity-50 font-bold tracking-widest mb-4">SPENDING ANALYSIS</p>
                <div id="categoryBars" class="space-y-3">
                    </div>
            </div>
        </div>

        <div class="px-6 space-y-3">
            <div class="flex items-center bg-gray-50 rounded-2xl p-4 border border-gray-100">
                <span class="text-xl font-bold text-gray-400 mr-2">¥</span>
                <input type="number" id="amountInput" placeholder="金額" class="bg-transparent text-2xl font-black w-full outline-none">
                <div class="text-right border-l pl-3 ml-2">
                    <p class="text-[9px] text-gray-400 font-bold">1k JPY=</p>
                    <input type="number" id="rateInput" value="51.5" step="0.1" class="w-8 text-xs font-bold text-blue-500 bg-transparent outline-none">
                </div>
            </div>
            
            <input type="text" id="descInput" placeholder="項目描述 (如: 築地市場)" class="w-full bg-gray-50 border border-gray-100 rounded-2xl py-4 px-5 text-sm outline-none">
            
            <div class="flex gap-2">
                <select id="categoryInput" class="flex-1 bg-gray-50 border border-gray-100 rounded-2xl py-4 px-3 text-sm outline-none">
                    <option value="utensils">🍴 美食</option>
                    <option value="train">🚃 交通</option>
                    <option value="shopping-bag">🛍️ 購物</option>
                    <option value="hotel">🏨 住宿</option>
                    <option value="ticket">🎫 景點</option>
                </select>
                <button onclick="addRecord()" class="flex-1 bg-blue-600 text-white font-bold rounded-2xl py-4 active:scale-95 transition-all">
                    儲存紀錄
                </button>
            </div>
        </div>

        <div class="px-6 mt-8 pb-24">
            <h2 class="font-black text-gray-400 text-xs tracking-widest mb-4 uppercase">Transactions</h2>
            <div id="recordList" class="space-y-3"></div>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white/90 backdrop-blur-lg border-t p-6 flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total JPY</p>
                <p id="totalJPY" class="font-black text-xl text-gray-800">¥ 0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total HKD</p>
                <p id="totalHKD" class="font-black text-xl text-blue-600">HK$ 0</p>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('jp_trip_data')) || [];
        const catMap = { utensils: "美食", train: "交通", "shopping-bag": "購物", hotel: "住宿", ticket: "景點" };

        function updateStats() {
            const container = document.getElementById('categoryBars');
            const total = records.reduce((sum, r) => sum + Number(r.amount), 0);
            container.innerHTML = '';

            const catTotals = {};
            records.forEach(r => catTotals[r.icon] = (catTotals[r.icon] || 0) + Number(r.amount));

            Object.keys(catMap).forEach(key => {
                const amount = catTotals[key] || 0;
                const percent = total > 0 ? (amount / total * 100).toFixed(0) : 0;
                container.innerHTML += `
                    <div>
                        <div class="flex justify-between text-[10px] mb-1">
                            <span>${catMap[key]}</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="w-full bg-gray-800 rounded-full h-1.5">
                            <div class="bg-blue-500 h-1.5 rounded-full chart-bar" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function render() {
            const list = document.getElementById('recordList');
            const rate = parseFloat(document.getElementById('rateInput').value) / 1000;
            list.innerHTML = '';
            
            let totalJpy = 0;
            records.slice().reverse().forEach((item, index) => {
                const realIndex = records.length - 1 - index;
                totalJpy += Number(item.amount);
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white border border-gray-50 p-3 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-${item.icon} text-gray-300"></i>
                            <div>
                                <p class="font-bold text-gray-700 text-sm">${item.desc || '未命名'}</p>
                                <p class="text-[9px] text-gray-400 uppercase">${item.time}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-right">
                            <div>
                                <p class="font-bold text-gray-800">¥${Number(item.amount).toLocaleString()}</p>
                                <p class="text-[9px] text-gray-300">HK$${(item.amount * rate).toFixed(0)}</p>
                            </div>
                            <button onclick="deleteItem(${realIndex})" class="text-gray-200 hover:text-red-400"><i class="fas fa-times-circle"></i></button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalJPY').innerText = `¥ ${totalJpy.toLocaleString()}`;
            document.getElementById('totalHKD').innerText = `HK$ ${(totalJpy * rate).toFixed(0)}`;
            updateStats();
        }

        function addRecord() {
            const amount = document.getElementById('amountInput').value;
            const desc = document.getElementById('descInput').value;
            const icon = document.getElementById('categoryInput').value;
            if (!amount) return;

            records.push({ 
                amount, desc, icon, 
                time: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                method: "Cash" 
            });
            localStorage.setItem('jp_trip_data', JSON.stringify(records));
            document.getElementById('amountInput').value = '';
            document.getElementById('descInput').value = '';
            render();
        }

        function deleteItem(i) {
            if(confirm('刪除這筆紀錄？')) { records.splice(i, 1); localStorage.setItem('jp_trip_data', JSON.stringify(records)); render(); }
        }

        function exportToCSV() {
            if (records.length === 0) return alert('沒有紀錄');
            const rate = parseFloat(document.getElementById('rateInput').value) / 1000;
            let csv = "\uFEFF日期,描述,類別,日圓(JPY),港幣(HKD)\n";
            records.forEach(r => {
                csv += `${r.time},${r.desc},${catMap[r.icon]},${r.amount},${(r.amount * rate).toFixed(1)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `日本旅行支出報告.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearAll() { if(confirm('全清空？')) { records = []; localStorage.removeItem('jp_trip_data'); render(); } }

        document.getElementById('rateInput').addEventListener('input', render);
        render();
    </script>
</body>
</html>
